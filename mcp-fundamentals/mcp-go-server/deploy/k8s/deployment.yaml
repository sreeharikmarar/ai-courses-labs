apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-wikipedia-server
  namespace: mcp
  labels:
    app: mcp-wikipedia-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-wikipedia-server
  template:
    metadata:
      labels:
        app: mcp-wikipedia-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: mcp-wikipedia-server
          image: mcp-wikipedia-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
